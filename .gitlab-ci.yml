# Image digests pinned for supply chain security.
# golang:1.25.5 (matches local toolchain)
image: golang:1.25.5

stages:
  - lint
  - test
  - build
  - image

cache:
  key:
    files:
      - go.sum
  paths:
    - /go/pkg/mod

variables:
  CGO_ENABLED: "0"
  VERSION: ${CI_COMMIT_TAG:-dev}
  LDFLAGS: "-X github.com/rdoorn/safe/pkg/version.Version=${VERSION}"

# --- Lint ---

fmt:
  stage: lint
  script:
    - test -z "$(gofmt -l .)"

vet:
  stage: lint
  script:
    - go vet ./...

golangci-lint:
  stage: lint
  image: golangci/golangci-lint:v2.7.2
  script:
    - golangci-lint run ./...

# --- Test ---

test:
  stage: test
  variables:
    CGO_ENABLED: "1"
  script:
    - go test -short -race ./...

# --- Build ---

build:
  stage: build
  parallel:
    matrix:
      - GOOS: linux
        GOARCH: [amd64, arm64]
      - GOOS: darwin
        GOARCH: [amd64, arm64]
  script:
    - mkdir -p dist
    - for b in safe safe-init safe-fw safe-dns safe-keyholder; do
        go build -ldflags "${LDFLAGS}" -o dist/$${b}-${GOOS}-${GOARCH} ./cmd/$${b};
      done
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# --- Image ---

image:
  stage: image
  image: docker:27-cli
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_REF: "$CI_REGISTRY_IMAGE/safe-runtime:$CI_COMMIT_SHORT_SHA"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker buildx create --use --name safebuild
    - docker buildx build --platform linux/amd64 -t "$IMAGE_REF" --push .
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
